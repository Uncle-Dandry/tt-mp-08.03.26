  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function (location) {
        if (location.search[1] === '/') {
          const decoded = location.search
            .slice(1)
            .split('&')
            .map((part) => part.replace(/~and~/g, '&'))
            .join('?')

          window.history.replaceState(null, '', decoded + location.hash)
        }
      })(window.location)
    </script>
